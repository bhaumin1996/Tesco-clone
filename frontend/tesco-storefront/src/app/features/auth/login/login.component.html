<div class="login-page">

  <!-- Animated background -->
  <div class="login-bg">
    <div class="login-bg__orb login-bg__orb--1"></div>
    <div class="login-bg__orb login-bg__orb--2"></div>
    <div class="login-bg__orb login-bg__orb--3"></div>
    <div class="login-bg__orb login-bg__orb--4"></div>
    <div class="login-bg__orb login-bg__orb--5"></div>
    <div class="login-bg__grid"></div>
  </div>

  <!-- Hero branding -->
  <div class="login-hero">
<p class="login-hero__welcome">
      <span class="login-hero__welcome-wave">👋</span>
      Welcome back!
    </p>
    <p class="login-hero__tagline">Your everyday essentials, delivered.</p>
  </div>

  <!-- Login card -->
  <div class="login-card">

    <div class="login-card__glow"></div>

    <div class="login-card__header">
      <div class="login-card__icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h1 class="login-card__title">Sign in</h1>
      <p class="login-card__subtitle">Welcome back to Tesco</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            id="email"
            type="email"
            class="form-control"
            [class.is-invalid]="emailError"
            formControlName="email"
            autocomplete="email"
            placeholder="your@email.com"
          />
        </div>
        @if (emailError) { <span class="form-error">{{ emailError }}</span> }
      </div>

      <div class="form-group">
        <div class="form-label-row">
          <label class="form-label" for="password">Password</label>
          <a routerLink="/auth/forgot-password" class="login-card__forgot">Forgot password?</a>
        </div>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-control form-control--has-toggle"
            [class.is-invalid]="passwordError"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button type="button" class="input-toggle" (click)="toggleShowPassword()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
        @if (passwordError) { <span class="form-error">{{ passwordError }}</span> }
      </div>

      <button type="submit" class="login-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="login-btn__spinner"></span> Signing in...
        } @else {
          Sign in
        }
      </button>
    </form>

    <div class="login-card__divider"><span>New to Tesco?</span></div>

    <a routerLink="/auth/register" class="login-card__register">
      Create an account
    </a>

  </div>

  <!-- Footer -->
  <div class="login-footer">
    <a routerLink="/" class="login-footer__home">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to Tesco home
    </a>
    <p>© {{ currentYear }} Tesco Stores Ltd. All rights reserved.</p>
  </div>

</div>
